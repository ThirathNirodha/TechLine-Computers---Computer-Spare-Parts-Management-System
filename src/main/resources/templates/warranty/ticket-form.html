<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <h1 th:text="${ticket.id != null ? 'Edit Service Ticket' : 'New Service Ticket'}">Service Ticket</h1>
    <a href="/warranty/tickets" class="btn">Back</a>

    <form th:action="@{/warranty/tickets/save}" th:object="${ticket}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="form-group">
            <label>Customer</label>
            <select name="customerId" required>
                <option value="">-- Select --</option>
                <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.name}" th:selected="${ticket.customer != null && ticket.customer.id == c.id}">Customer</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sale (optional)</label>
            <select name="saleId">
                <option value="">-- None --</option>
                <option th:each="s : ${sales}" th:value="${s.id}" th:text="'Sale #' + s.id" th:selected="${ticket.sale != null && ticket.sale.id == s.id}">Sale</option>
            </select>
        </div>
        <div class="form-group">
            <label>Product (optional)</label>
            <select name="productId">
                <option value="">-- None --</option>
                <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}" th:selected="${ticket.product != null && ticket.product.id == p.id}">Product</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}" rows="3" style="width: 400px;" required></textarea>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select th:field="*{status}">
                <option th:value="OPEN">Open</option>
                <option th:value="IN_PROGRESS">In Progress</option>
                <option th:value="COMPLETED">Completed</option>
                <option th:value="CANCELLED">Cancelled</option>
            </select>
        </div>
        <div class="form-group">
            <label>Due Date</label>
            <input type="datetime-local" th:field="*{dueDate}">
        </div>
        <button type="submit" class="btn">Save</button>
    </form>
</section>
</body>
</html>
