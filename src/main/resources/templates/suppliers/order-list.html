<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <h1>All Purchase Orders</h1>
    <a href="/suppliers" class="btn">Back to Suppliers</a>

    <table>
        <thead>
        <tr>
            <th>Order #</th>
            <th>Supplier</th>
            <th>Date</th>
            <th>Status</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.id}">-</td>
            <td th:text="${o.supplier != null ? o.supplier.name : '-'}">-</td>
            <td th:text="${o.orderDate != null ? #temporals.format(o.orderDate, 'yyyy-MM-dd') : '-'}">-</td>
            <td th:text="${o.status}">-</td>
            <td th:text="${o.totalAmount}">-</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
