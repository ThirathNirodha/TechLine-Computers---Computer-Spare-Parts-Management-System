<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <h1>Supplier &amp; Procurement Management</h1>
    <a href="/suppliers/new" class="btn">Add Supplier</a>
    <a th:href="@{/suppliers/orders/new}" class="btn">New Purchase Order</a>
    <a th:href="@{/suppliers/orders}" class="btn">All Orders</a>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${suppliers}">
            <td th:text="${s.name}">-</td>
            <td th:text="${s.contactPerson}">-</td>
            <td th:text="${s.email}">-</td>
            <td th:text="${s.phone}">-</td>
            <td>
                <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" class="btn btn-small">Edit</a>
                <a th:href="@{/suppliers/{id}/orders(id=${s.id})}" class="btn btn-small">Orders</a>
                <a th:href="@{/suppliers/{id}/payments(id=${s.id})}" class="btn btn-small">Payments</a>
                <form th:action="@{/suppliers/delete/{id}(id=${s.id})}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-small btn-danger" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(suppliers)}">No suppliers.</p>
</section>
</body>
</html>
